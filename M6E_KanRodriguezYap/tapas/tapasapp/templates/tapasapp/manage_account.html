<!DOCTYPE html>
<html>
<head>
    <title>Manage Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-5">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h1 class="h3 mb-4 text-center">Manage Account</h1>
                        <p class="mb-4"><strong>Username:</strong> {{ user.username }}</p>
                        <div class="d-grid gap-2">
                            <a href="{% url 'change_password' user.id %}" class="btn btn-warning">Change Password</a>
                            <a href="{% url 'delete_account' user.id %}" class="btn btn-danger">Delete Account</a>
                            <a href="{% url 'basic_list' user.id %}" class="btn btn-outline-secondary">Back</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
