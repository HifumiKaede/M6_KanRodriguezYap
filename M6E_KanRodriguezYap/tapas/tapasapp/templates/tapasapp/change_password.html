<!DOCTYPE html>
<html>
<head>
    <title>Change Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-5">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h1 class="h3 mb-4 text-center">Change Password</h1>

                        {% if message %}
                        <div class="alert alert-danger" role="alert">{{ message }}</div>
                        {% endif %}

                        <form method="POST">
                            {% csrf_token %}
                            <div class="mb-3">
                                <input type="password" name="current" class="form-control" placeholder="Current Password" required>
                            </div>
                            <div class="mb-3">
                                <input type="password" name="new" class="form-control" placeholder="New Password" required>
                            </div>
                            <div class="mb-3">
                                <input type="password" name="confirm" class="form-control" placeholder="Confirm New Password" required>
                            </div>
                            <div class="d-grid gap-2">
                                <button class="btn btn-primary" type="submit">Confirm</button>
                                <button class="btn btn-outline-secondary" type="submit" name="cancel" value="1">Cancel</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
