{% extends "base.html" %}

{% block content %}

<h2>Add Water Bottle</h2>

<form method="POST">
    {% csrf_token %}

    <p>
        <label>SKU:</label><br>
        <input type="text" name="sku" required>
    </p>

    <p>
        <label>Brand:</label><br>
        <input type="text" name="brand" required>
    </p>

    <p>
        <label>Cost:</label><br>
        <input type="text" name="cost" required>
    </p>

    <p>
        <label>Size:</label><br>
        <input type="text" name="size" required>
    </p>

    <p>
        <label>Mouth Size:</label><br>
        <input type="text" name="mouth_size" required>
    </p>

    <p>
        <label>Color:</label><br>
        <input type="text" name="color" required>
    </p>

    <p>
        <label>Supplier:</label><br>
        <select name="supplied_by">
            {% for supplier in suppliers %}
            <option value="{{ supplier.id }}">{{ supplier.name }}</option>
            {% endfor %}
        </select>
    </p>

    <p>
        <label>Current Quantity:</label><br>
        <input type="number" name="current_quantity" required>
    </p>

    <button type="submit">Add Bottle</button>
</form>

<br>
<a href="{% url 'view_supplier' %}"><button type="button" class="btn-secondary" style="width:auto; padding: 10px 16px;">Cancel</button></a>

{% endblock %}
